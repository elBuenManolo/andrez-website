name: Update Google Reviews

on:
  schedule:
    # Runs everyday at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual execution from GitHub actions tab

permissions:
  contents: write

jobs:
  update-reviews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch and update reviews
        run: npm run update-reviews

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes to reviews-data.json
          if git diff --quiet public/reviews-data.json; then
            echo "No changes in Google rating or review count."
          else
            git add public/reviews-data.json
            git commit -m "chore: update live Google rating and reviews count [skip ci]"
            git push
          fi
